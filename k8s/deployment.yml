apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockalert
  namespace: stockalert
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockalert
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: stockalert
    spec:
      containers:
        - name: stockalert
          image: jayards/stockalert:v1.0.5
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: stockalert-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockalert-secret
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10